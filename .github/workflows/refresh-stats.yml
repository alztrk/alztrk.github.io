name: Refresh Stats

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch fresh stats
        run: node scripts/fetch-stats.mjs

      - name: Build
        run: npx vite build

      - name: Deploy to gh-pages
        run: npx gh-pages -d dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit updated JSON
        run: |
          git config user.name "alztrk"
          git config user.email "alztrk@users.noreply.github.com"
          git add src/user.json src/repos.json src/events.json src/contribs.json
          git diff --staged --quiet || git commit -m "Auto-refresh stats [skip ci]"
          git push
