name: Refresh Stats

on:
  schedule:
    - cron: '0 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch fresh stats
        run: npm run fetch

      - name: Build and deploy
        run: npm run build && npm run deploy

      - name: Commit updated data
        run: |
          git config user.name "alztrk"
          git config user.email "alztrk@users.noreply.github.com"
          git add src/user.json src/repos.json src/events.json src/contribs.json
          git diff --staged --quiet || git commit -m "Auto-refresh stats data"
          git push
